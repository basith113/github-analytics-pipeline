version: 2

models:
  - name: stg_github_events
    description: |
      Staging table for GitHub events.
      Parses raw JSON from GH Archive into clean columns.
      
      **Grain**: One row per event
      **Volume**: ~2.5M rows from 7-day backfill + ~10K rows/hour incremental
      **Materialization**: Table
      **Schema**: STAGING
      
      This is the foundation for all downstream marts and analyses.
    
    columns:
      - name: event_id
        description: Unique event ID from GH Archive
        tests:
          - not_null
          - unique
      
      - name: event_type
        description: |
          Type of GitHub event
          Examples: PushEvent, PullRequestEvent, IssuesEvent, etc.
        tests:
          - not_null
          - accepted_values:
              values: ['PushEvent', 'PullRequestEvent', 'IssuesEvent', 
                       'IssueCommentEvent', 'WatchEvent', 'ForkEvent',
                       'CreateEvent', 'DeleteEvent', 'MemberEvent', 
                       'ReleaseEvent', 'PullRequestReviewEvent']
      
      - name: actor_id
        description: Unique ID of the GitHub user/bot that triggered the event
        tests:
          - not_null
      
      - name: actor_login
        description: GitHub username or bot name
        tests:
          - not_null
      
      - name: actor_type
        description: Type of actor - User or Bot
        tests:
          - accepted_values:
              values: ['User', 'Bot']
      
      - name: repo_id
        description: Unique repository ID
        tests:
          - not_null
      
      - name: repo_name
        description: Repository name in owner/name format
        tests:
          - not_null
      
      - name: created_at
        description: When the event occurred (UTC)
        tests:
          - not_null
      
      - name: payload
        description: Raw event payload (VARIANT/JSON) - contains event-specific details
      
      - name: source_file
        description: GH Archive source file (YYYY-MM-DD-H.json.gz)
        tests:
          - not_null
      
      - name: loaded_at
        description: When the event was loaded into RAW.GITHUB_EVENTS
        tests:
          - not_null
      
      - name: dbt_loaded_at
        description: When this staging record was created
        tests:
          - not_null
      
      - name: dbt_run_id
        description: dbt run ID for lineage tracking
